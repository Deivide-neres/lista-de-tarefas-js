<!DOCTYPE html>
<html lang="pt-br">
<hea>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tarefas</title>
   
    <!--CSS do projeto-->
    <link rel="stylesheet" href="style.css">
    <!--fonte Awesome -->
<link rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
crossorigin="anonymous" 
referrerpolicy="no-referrer" />
</head>
 

<body>
    <div class="list-container">
        <header>
            <h1>Lista de tarefas</h1>
        </header>
   
    
    <form id="lista-form">
          <p>Adicione sua tarefa:</p>
          <div class="form-control">
             <input type="text" id="lista-input" placeholder="Oque você precisa fazer?">
             <button type="submit">
                    <i class="fa-solid fa-plus"></i>
             </button>
        </div>

    </form> 
    <form id="edit-form" class="hide">
        <p>Edite sua tarefa</p>
        <div class="form-control">
        <input type="text" id="search-input" >
        <button type="submit"><i class="fa-solid fa-check-double"></i></button>
         </div>
         <button id="cancel-edit-btn">Cancelar</button> 
    </form> 

    <div id="toolbar" >
        <div id="search">
            <h4>Pesquisar</h4>
            <form >
              <input type="text" id="search-input" placeholder="Buscar">  
              <button id="erase-button"><i class="fa-solid fa-delete-left"></i>
            </button>
            </form>
        </div>
         <div id="filter">
            <h4>Filtrar</h4>
            <select id="filter-select">
                <option value="all">Todas</option>
                <option value="done">Feitas</option>
                <option value="to-do">A Fazer</option>
            </select>
         </div>
     </div>
     <div id="todo-list">
        <div class="todo done">
            <h3>Estou fazendo alguma coisa...</h3>
            <button class="finish-todo">
                <i class="fa-solid fa-check"></i> 
            </button>
            <button class="edit-todo">
                <i class="fa-solid fa-pen"></i> 
            </button>
            <button class="remove-todo">
                <i class="fa-solid fa-xmark"></i> 
            </button>
        </div>
         <div class="todo">
            <h3>Estou fazendo alguma coisa...</h3>
            <button class="finish-todo">
                <i class="fa-solid fa-check"></i> 
            </button>
            <button class="edit-todo">
                <i class="fa-solid fa-pen"></i> 
            </button>
            <button class="remove-todo">
                <i class="fa-solid fa-xmark"></i> 
            </button>
        </div>
     </div>
    </div>
     <script src="script.js" defer></script>
</body>
</html>
